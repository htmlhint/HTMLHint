<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HTMLHint — hero marquee</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Fredoka:wght@600;700&display=swap');

  :root {
    --bg:        #fbf7f3;
    --bg-2:      #f3ece0;
    --surface:   #ffffff;
    --ink:       #141619;
    --ink-2:     #2a2e35;
    --muted:     #6b7280;
    --muted-2:   #9ca3af;
    --border:    #e5dfd5;

    --red:       #e55a4a;
    --red-2:     #c2392a;
    --red-soft:  rgba(229,90,74,0.10);
    --red-ring:  rgba(229,90,74,0.28);

    --term-bg:   #16181d;
    --term-fg:   #e8ebf0;
    --term-mute: #7a8394;

    --font-display: 'Geist', system-ui, -apple-system, sans-serif;
    --font-mono:    'Geist Mono', ui-monospace, Menlo, monospace;
    --font-logo:    'Fredoka', var(--font-display);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0f1013; }
  body {
    display: flex; align-items: flex-start; justify-content: flex-start;
    min-height: 100vh; padding: 0;
    font-family: var(--font-display); color: var(--ink);
  }
  @media screen and (min-width: 1300px) {
    body { display: grid; place-items: center; padding: 40px; }
  }

  .stage {
    width: 1200px; height: 260px;
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    display: grid;
    grid-template-columns: 440px 1fr;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    box-shadow: 0 40px 90px -20px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.06);
  }
  /* subtle dot grid on left panel */
  .stage::before {
    content: "";
    position: absolute; inset: 0 auto 0 0;
    width: 440px;
    pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(20,22,25,0.06) 1px, transparent 1.3px);
    background-size: 24px 24px;
    z-index: 1;
  }

  /* ================= LEFT: brand + tagline + pulse ================= */
  .left {
    position: relative;
    z-index: 2;
    padding: 32px 34px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    align-content: center;
  }
  .brand-row {
    display: flex; align-items: center; gap: 16px;
  }
  .mark {
    width: 68px; height: 68px;
    border-radius: 50%;
    display: block;
    box-shadow: 0 0 0 4px var(--red-soft), 0 8px 24px -6px var(--red-ring);
  }
  .mark img {
    width: 100%; height: 100%;
    display: block;
    border-radius: 50%;
  }
  .name {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--ink);
    line-height: 1;
  }
  .tagline {
    font-family: var(--font-mono);
    font-size: 15.5px;
    color: var(--muted);
    letter-spacing: 0.02em;
    line-height: 1.55;
    max-width: 380px;
    white-space: nowrap;
  }
  .tagline b {
    color: var(--red);
    font-weight: 600;
  }
  .meta-row {
    display: flex;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 13.5px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .chip {
    padding: 5px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .chip .k { color: var(--red); font-weight: 700; }

  /* ================= RIGHT: terminal ================= */
  .term {
    position: relative;
    z-index: 2;
    background: var(--term-bg);
    overflow: hidden;
    border-left: 1px solid rgba(0,0,0,0.08);
    font-family: var(--font-mono);
    color: var(--term-fg);
    display: flex;
    flex-direction: column;
  }
  .term-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 20px;
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--term-mute);
    border-bottom: 1px solid #2a2e38;
    flex-shrink: 0;
  }
  .dots { display: flex; gap: 7px; }
  .dots span { width: 10px; height: 10px; border-radius: 50%; }
  .dots span:nth-child(1){ background:#ff5f57;}
  .dots span:nth-child(2){ background:#febc2e;}
  .dots span:nth-child(3){ background:#28c840;}

  .term-body {
    flex: 1;
    padding: 14px 24px 16px;
    font-size: 15.5px;
    line-height: 1.6;
    position: relative;
    overflow: hidden;
  }
  .tline {
    opacity: 0;
    display: none;
    transition: opacity .25s;
  }
  .tline.in { opacity: 1; display: block; }
  .prompt { color: #65d37a; }
  .cmd    { color: var(--term-fg); }
  .arg    { color: #6aa7ff; }
  .scan   { color: var(--term-mute); }

  .hit {
    display: grid;
    grid-template-columns: 16px 78px auto 1fr;
    gap: 12px;
    align-items: baseline;
    padding: 2px 0;
  }
  .hit .x {
    color: #ff7a66;
    font-weight: 700;
  }
  .hit .loc {
    color: var(--term-mute);
    font-size: 14px;
  }
  .hit .rule {
    color: #ffb15a;
    background: rgba(255,177,90,0.12);
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 13.5px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .hit .msg {
    color: var(--term-fg);
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .summary {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #2a2e38;
    color: var(--term-fg);
    font-size: 15.5px;
    line-height: 1.55;
    white-space: nowrap;
  }
  .summary .n { color: #ff7a66; font-weight: 700; }
  .summary .r { color: #ffb15a; }
  .summary .g { color: #65d37a; font-weight: 700; }

  .cursor {
    display: inline-block;
    width: 7px; height: 12px;
    background: var(--term-fg);
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* stream container — content now fits naturally; no transform needed */
  .stream { position: relative; }
</style>
</head>
<body>
<div class="stage" id="stage">

  <div class="left">
    <div class="brand-row">
      <div class="mark"><img src="htmlhint.png" alt="HTMLHint"></div>
      <div class="name">HTMLHint</div>
    </div>
    <div class="tagline">
      Static analysis for HTML.<br>
      <b>40+ battle-tested rules</b> · CLI &amp; API.
    </div>
    <div class="meta-row">
      <div class="chip"><span class="k">npm</span>&nbsp;htmlhint</div>
      <div class="chip">MIT</div>
    </div>
  </div>

  <div class="term">
    <div class="term-head">
      <div class="dots"><span></span><span></span><span></span></div>
      <span>$ htmlhint</span>
    </div>
    <div class="term-body">
      <div class="stream" id="stream">
        <div class="tline" id="tl0"><span class="prompt">~/site ❯</span> <span class="cmd">htmlhint</span> <span class="arg">index.html</span></div>
        <div class="tline" id="tl1"><span class="scan">Scanning…</span></div>
        <div id="hits"></div>
        <div class="tline" id="tl2"><div class="summary" id="summary"></div></div>
        <div class="tline" id="tl3"><span class="prompt">~/site ❯</span> <span class="cursor"></span></div>
      </div>
    </div>
  </div>

</div>

<script>
  const HITS = [
    { line: 2,  col: 3,  rule: 'tagname-lowercase',        msg: "Tag [ HEAD ] must be lowercase." },
    { line: 3,  col: 1,  rule: 'doctype-first',            msg: "Doctype must be declared first." },
    { line: 8,  col: 7,  rule: 'alt-require',              msg: "<img> must have an alt attribute." },
    { line: 9,  col: 7,  rule: 'tag-pair',                 msg: "Tag must be paired." },
    { line: 11, col: 10, rule: 'inline-style-disabled',    msg: "Inline style is not allowed." },
  ];

  const stream = document.getElementById('stream');
  const hitsWrap = document.getElementById('hits');
  const summaryEl = document.getElementById('summary');
  const tl0 = document.getElementById('tl0');
  const tl1 = document.getElementById('tl1');
  const tl2 = document.getElementById('tl2');
  const tl3 = document.getElementById('tl3');

  // Derived from HITS so summary stays in sync when hits are edited.
  const problemCount = HITS.length;
  const ruleCount = new Set(HITS.map(h => h.rule)).size;
  summaryEl.innerHTML =
    `<span class="n">${problemCount}</span> problems · ` +
    `<span class="r">${ruleCount}</span> rules fired · ` +
    `<span class="g">42ms</span>`;

  function renderHit(h) {
    const wrap = document.createElement('div');
    wrap.className = 'tline in';
    wrap.innerHTML = `
      <div class="hit">
        <span class="x">✗</span>
        <span class="loc">L${h.line}:${h.col}</span>
        <span class="rule">${h.rule}</span>
        <span class="msg">${h.msg}</span>
      </div>`;
    hitsWrap.appendChild(wrap);
  }

  let timers = [];
  function at(t, fn) { timers.push(setTimeout(fn, t)); }
  function clearAll() { timers.forEach(clearTimeout); timers = []; }

  const TIMELINE = {
    cmd:      400,
    scan:     1100,
    firstHit: 1700,
    perHit:   1600,   // 5 hits * 1600 = 8s
    summary:  10400,
    prompt:   11400,
    loopEnd:  20000,  // dwell ~8.5s on final frame so summary is readable
  };

  function runLoop() {
    clearAll();
    // reset
    [tl0, tl1, tl2, tl3].forEach(el => el.classList.remove('in'));
    hitsWrap.innerHTML = '';

    at(TIMELINE.cmd,     () => tl0.classList.add('in'));
    at(TIMELINE.scan,    () => tl1.classList.add('in'));
    HITS.forEach((h, i) => {
      at(TIMELINE.firstHit + i * TIMELINE.perHit, () => renderHit(h));
    });
    at(TIMELINE.summary, () => tl2.classList.add('in'));
    at(TIMELINE.prompt,  () => tl3.classList.add('in'));
    at(TIMELINE.loopEnd, () => runLoop());
  }

  window.runLoop = runLoop;
  runLoop();
</script>
</body>
</html>
